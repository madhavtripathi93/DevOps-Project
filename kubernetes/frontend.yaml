apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-frontend
  namespace: devops-project
  labels:
    app: agent-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-frontend
  template:
    metadata:
      labels:
        app: agent-frontend
    spec:
      containers:
        - name: agent-frontend
          image: DOCKER_REGISTRY/agent-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5173
          env:
            # We configure Nginx to proxy API requests
            - name: VITE_API_BASE
              value: "/api"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: agent-frontend
  namespace: devops-project
spec:
  type: NodePort
  selector:
    app: agent-frontend
  ports:
    - port: 80
      targetPort: 5173
      nodePort: 30081
