# =============================================================================
# Horizontal Pod Autoscaler (HPA)
# =============================================================================
# Automatically scales the deployment based on CPU and memory utilization.
# Requires the metrics-server addon to be enabled in Minikube:
#   minikube addons enable metrics-server
#
# Scale range: 3 (minimum) to 10 (maximum) replicas
# =============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-app-hpa
  namespace: devops-project
  labels:
    app: devops-app
    project: ai-devops-pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-app

  # Replica range
  minReplicas: 3
  maxReplicas: 10

  # Scaling metrics
  metrics:
    # Scale based on CPU usage
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # Scale up when CPU exceeds 70%

    # Scale based on memory usage
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80   # Scale up when memory exceeds 80%

  # Scaling behavior — controls how fast scaling happens
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60    # Wait 60s before scaling up again
      policies:
        - type: Pods
          value: 2                       # Add up to 2 pods at a time
          periodSeconds: 60

    scaleDown:
      stabilizationWindowSeconds: 300   # Wait 5 minutes before scaling down
      policies:
        - type: Pods
          value: 1                       # Remove 1 pod at a time
          periodSeconds: 120
