# =============================================================================
# Kubernetes Deployment — DevOps Flask Application
# =============================================================================
# Deploys the Flask application with:
#   - 3 replicas for high availability
#   - Rolling update strategy (zero-downtime deployments)
#   - Resource limits to prevent runaway containers
#   - Liveness and readiness probes for health monitoring
#   - Environment variables for pod metadata (used by the app)
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
  namespace: devops-project
  labels:
    app: devops-app
    project: ai-devops-pipeline
    version: "1.0.0"
spec:
  # Number of pod replicas — adjust based on load
  replicas: 3

  # Label selector to identify pods managed by this deployment
  selector:
    matchLabels:
      app: devops-app

  # Rolling update strategy for zero-downtime deployments
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          # Allow 1 extra pod during update
      maxUnavailable: 0     # Never have fewer than desired replicas

  template:
    metadata:
      labels:
        app: devops-app
        project: ai-devops-pipeline
        version: "1.0.0"
      annotations:
        # Prometheus scrape configuration
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      # Graceful shutdown period
      terminationGracePeriodSeconds: 30

      containers:
        - name: devops-app
          # Image will be updated by Jenkins pipeline or manual deploy
          # For local Minikube: use 'eval $(minikube docker-env)' and build locally
          image: devops-app:latest
          imagePullPolicy: IfNotPresent

          # Container port
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP

          # Environment variables — pod metadata injected via downward API
          env:
            - name: PORT
              value: "5000"
            - name: APP_VERSION
              value: "1.0.0"
            - name: FLASK_DEBUG
              value: "false"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          # Resource limits and requests
          resources:
            requests:
              cpu: "100m"       # 0.1 CPU cores minimum
              memory: "128Mi"   # 128 MB memory minimum
            limits:
              cpu: "500m"       # 0.5 CPU cores maximum
              memory: "512Mi"   # 512 MB memory maximum

          # Liveness probe — restart the pod if the app is unresponsive
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15    # Wait 15s before first check
            periodSeconds: 10          # Check every 10 seconds
            timeoutSeconds: 5          # Timeout after 5 seconds
            failureThreshold: 3        # Restart after 3 consecutive failures

          # Readiness probe — only send traffic when the app is ready
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5000
            initialDelaySeconds: 10    # Wait 10s before first check
            periodSeconds: 5           # Check every 5 seconds
            timeoutSeconds: 3          # Timeout after 3 seconds
            failureThreshold: 3        # Remove from service after 3 failures
