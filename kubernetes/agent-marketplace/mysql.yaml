apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-mysql
  namespace: devops-project
  labels:
    app: agent-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-mysql
  template:
    metadata:
      labels:
        app: agent-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "your_password"
            - name: MYSQL_DATABASE
              value: "agent_marketplace"
          ports:
            - containerPort: 3306
              name: mysql
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: agent-mysql
  namespace: devops-project
spec:
  ports:
    - port: 3306
  selector:
    app: agent-mysql
  clusterIP: None
