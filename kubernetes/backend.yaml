apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-backend
  namespace: devops-project
  labels:
    app: agent-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-backend
  template:
    metadata:
      labels:
        app: agent-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: agent-backend
          image: DOCKER_REGISTRY/agent-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              value: "your_password"
            - name: DB_HOST
              value: "agent-mysql"
            - name: DB_NAME
              value: "agent_marketplace"
            - name: DATABASE_URL
              value: "mysql+mysqlconnector://root:your_password@agent-mysql/agent_marketplace"
            - name: ALLOWED_ORIGINS
              value: "*"
            - name: MAIN_AGENT_API_KEY
              value: ""
            - name: MAIN_AGENT_MODEL
              value: "llama3.1:8b"
            - name: OLLAMA_BASE_URL
              value: "http://host.minikube.internal:11434"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agent-backend
  namespace: devops-project
spec:
  type: NodePort
  selector:
    app: agent-backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080