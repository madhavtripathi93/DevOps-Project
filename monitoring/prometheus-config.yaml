# =============================================================================
# Prometheus Configuration (ConfigMap)
# =============================================================================
# Defines Prometheus scrape targets and intervals.
# Scrapes the Flask application's /metrics endpoint.
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
    project: ai-devops-pipeline
data:
  prometheus.yml: |
    # Global configuration
    global:
      scrape_interval: 15s          # Scrape targets every 15 seconds
      evaluation_interval: 15s       # Evaluate rules every 15 seconds
      scrape_timeout: 10s

    # Scrape configurations
    scrape_configs:
      # Scrape Prometheus itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Scrape the DevOps Flask application
      - job_name: 'devops-app'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - devops-project
        relabel_configs:
          # Only scrape pods with prometheus.io/scrape=true annotation
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          # Use the prometheus.io/path annotation for metrics path
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Use the prometheus.io/port annotation for port
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          # Add pod name label
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

      # Fallback: static config for direct scraping (works without K8s SD)
      - job_name: 'devops-app-static'
        static_configs:
          - targets: ['devops-app-service.devops-project.svc.cluster.local:80']
        metrics_path: /metrics
        scrape_interval: 10s
