# =============================================================================
# Kubernetes Tools Installation Role
# =============================================================================
# Installs kubectl and Minikube for local Kubernetes development.
# Supports both macOS (Homebrew) and Linux (direct binary download).
# All tasks are idempotent — safe to run multiple times.
# =============================================================================

---
# ---------- kubectl Installation ----------

- name: "Check if kubectl is already installed"
  ansible.builtin.command: kubectl version --client --short
  register: kubectl_installed
  changed_when: false
  failed_when: false

- name: "[macOS] Install kubectl via Homebrew"
  ansible.builtin.command: brew install kubectl
  when:
    - ansible_facts['os_family'] == "Darwin"
    - kubectl_installed.rc != 0
  register: kubectl_install
  changed_when: kubectl_install.rc == 0

- name: "[Linux] Download kubectl binary"
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: "0755"
  become: true
  when:
    - ansible_facts['os_family'] != "Darwin"
    - kubectl_installed.rc != 0

# ---------- Minikube Installation ----------

- name: "Check if Minikube is already installed"
  ansible.builtin.command: minikube version --short
  register: minikube_installed
  changed_when: false
  failed_when: false

- name: "[macOS] Install Minikube via Homebrew"
  ansible.builtin.command: brew install minikube
  when:
    - ansible_facts['os_family'] == "Darwin"
    - minikube_installed.rc != 0
  register: minikube_install
  changed_when: minikube_install.rc == 0

- name: "[Linux] Download Minikube binary"
  ansible.builtin.get_url:
    url: "https://storage.googleapis.com/minikube/releases/{{ minikube_version }}/minikube-linux-amd64"
    dest: /usr/local/bin/minikube
    mode: "0755"
  become: true
  when:
    - ansible_facts['os_family'] != "Darwin"
    - minikube_installed.rc != 0

# ---------- Verification ----------

- name: "Verify kubectl installation"
  ansible.builtin.command: kubectl version --client --short
  register: kubectl_version_output
  changed_when: false
  failed_when: false

- name: "Display kubectl version"
  ansible.builtin.debug:
    msg: "kubectl: {{ kubectl_version_output.stdout | default('Not installed') }}"

- name: "Verify Minikube installation"
  ansible.builtin.command: minikube version --short
  register: minikube_version_output
  changed_when: false
  failed_when: false

- name: "Display Minikube version"
  ansible.builtin.debug:
    msg: "Minikube: {{ minikube_version_output.stdout | default('Not installed') }}"

# ---------- Helpful Tips ----------

- name: "Display Kubernetes setup instructions"
  ansible.builtin.debug:
    msg: |
      Kubernetes tools installed successfully!

      To start a cluster:
        minikube start --profile=devops-cluster --driver=docker

      Or use Terraform:
        cd terraform/ && terraform init && terraform apply
