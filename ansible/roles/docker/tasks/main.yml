# =============================================================================
# Docker Installation Role
# =============================================================================
# Installs Docker Engine on the target system.
# Supports both macOS (via Homebrew/Docker Desktop) and Linux (apt).
# All tasks are idempotent — safe to run multiple times.
# =============================================================================

---
# ---------- macOS Installation (Docker Desktop via Homebrew) ----------

- name: "[macOS] Check if Docker is already installed"
  ansible.builtin.command: docker --version
  register: docker_installed
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] == "Darwin"

- name: "[macOS] Install Docker Desktop via Homebrew Cask"
  ansible.builtin.command: brew install --cask docker
  when:
    - ansible_facts['os_family'] == "Darwin"
    - docker_installed.rc != 0
  register: docker_install_result
  changed_when: docker_install_result.rc == 0

- name: "[macOS] Remind user to start Docker Desktop"
  ansible.builtin.debug:
    msg: |
      Docker Desktop has been installed.
      Please start Docker Desktop from Applications if it's not running.
      You can verify with: docker ps
  when:
    - ansible_facts['os_family'] == "Darwin"
    - docker_installed.rc != 0

# ---------- Linux Installation (apt-based distributions) ----------

- name: "[Linux] Install prerequisite packages"
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: "[Linux] Create keyrings directory"
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: "[Linux] Add Docker GPG key"
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: "[Linux] Add Docker repository"
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: "[Linux] Install Docker Engine"
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: "[Linux] Start and enable Docker service"
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: "[Linux] Add current user to docker group"
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    groups: docker
    append: true
  become: true
  when: ansible_facts['os_family'] == "Debian"

# ---------- Verification (All platforms) ----------

- name: "Verify Docker installation"
  ansible.builtin.command: docker --version
  register: docker_version
  changed_when: false

- name: "Display Docker version"
  ansible.builtin.debug:
    msg: "Docker installed: {{ docker_version.stdout }}"
